name: Build

on:
  workflow_dispatch:
    inputs:
      build_win_x64:
        description: "Build Windows x64"
        required: false
        default: true
        type: boolean
      build_mac:
        description: "Build macOS"
        required: false
        default: true
        type: boolean
      tag:
        description: "Release tag"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**.md"

permissions:
  contents: write

jobs:
  win_x64:
    if: ${{ github.event_name == 'push' || github.event.inputs.build_win_x64 == 'true' }}
    name: Release Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create portable Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          7z a -t7z -mx=9 artifacts/picSSS_windows_x64_green.7z .\build\windows\x64\runner\Release\*

      - name: Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artifacts/picSSS_windows_x64_green.7z

      - name: Upload Windows portable package
        uses: actions/upload-artifact@v7
        with:
          name: picSSS_windows_x64_green.7z
          path: artifacts/picSSS_windows_x64_green.7z
          if-no-files-found: error

  mac:
    if: ${{ github.event_name == 'push' || github.event.inputs.build_mac == 'true' }}
    name: Release Mac
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Rust core
        run: cargo build --release --manifest-path rust/Cargo.toml

      - name: Build macOS
        run: flutter build macos --release

      - name: Bundle Rust core
        run: |
          cp rust/target/release/libpicsss_core.dylib build/macos/Build/Products/Release/picsss.app/Contents/MacOS/
          codesign --force --deep --sign - build/macos/Build/Products/Release/picsss.app

      - name: Create dmg
        run: |
          mkdir -p artifacts/dmg-root
          cp -R build/macos/Build/Products/Release/picsss.app artifacts/dmg-root/
          ln -s /Applications artifacts/dmg-root/Applications
          hdiutil create \
            -volname "picSSS" \
            -srcfolder artifacts/dmg-root \
            -ov \
            -format UDZO \
            artifacts/picSSS_macos.dmg

      - name: Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artifacts/picSSS_macos.dmg

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v7
        with:
          name: picSSS_macos.dmg
          path: artifacts/picSSS_macos.dmg
          if-no-files-found: error
